### ============================================
### OUTPUT CONFIGURATION
### ============================================

monitor=eDP-1, 1920x1200, 960x2160, 1
# monitor=eDP-1, disable
monitor=HDMI-A-1, 3840x2160, 0x0, 1
# monitor=HDMI-A-1, 1920x1080, 0x0, 1
# monitor=HDMI-A-1, disable

workspace = 1, monitor:eDP-1, layout:dwindle
workspace = 2, monitor:HDMI-A-1
# workspace = 6, gapsin:0, gapsout:0, bordersize:0, rounding:0, drop_shadow:false

### ============================================
### STARTUP APPLICATIONS
### ============================================

exec-once = LANG=C waybar &
exec-once = swww-daemon &
exec-once = sleep 1 && swww img /home/krishnan/Pictures/Wallpapers/current
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = copyq --start-server &
exec-once = dunst &
#exec-once = fcitx5 &
exec-once = hyprpm reload -n
exec-once = systemctl --user start hyprpolkitagent
exec-once = tmux start-server

### ============================================
### ENVIRONMENT VARIABLES
### ============================================

env = XCURSOR_SIZE, 24
env = HYPRSHOT_DIR, /home/krishnan/Pictures/Screenshots
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME=qt5ct

### ============================================
### INPUT CONFIGURATION
### ============================================

input {
    kb_layout = us
    kb_variant = ,nodeadkeys
    kb_model =
    kb_options = ctrl:nocaps,altwin:swap_lalt_lwin
    kb_rules =

    follow_mouse = 1
    accel_profile = flat

    touchpad {
        natural_scroll = yes
        disable_while_typing = yes
        tap-to-click = yes
    }

    sensitivity = 0  # pointer accel from Sway
}

### ============================================
### APPEARANCE & THEMING
### ============================================

general {
    gaps_in = 3
    gaps_out = 3

    border_size = 2
    col.active_border = rgba(ffffff88) rgba(268bd2aa) 45deg
    col.inactive_border = rgba(595959aa)

    layout = scrolling
}

scrolling {
    column_width = 0.9
    fullscreen_on_one_column = true
}

decoration {
    rounding = 10

    blur {
        enabled = false
        size = 8
        passes = 3
    }
}

### ============================================
### ANIMATIONS
### ============================================

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    animation = specialWorkspace, 1, 6, default, slidevert
}

### ============================================
### LAYOUT CONFIGURATION
### ============================================

dwindle {
    pseudotile = yes
    preserve_split = yes
}

#master {
#    new_is_master = false
#}

# Gesture configuration per Hyprland Wiki
gesture = 3, down, dispatcher, movewindow, d
gesture = 3, up, dispatcher, movewindow, u
gesture = 3, left, dispatcher, movewindow, l
gesture = 3, right, dispatcher, movewindow, r
gesture = 4, horizontal, workspace
gesture = 4, up, scale:1.5, fullscreen


misc {
    disable_hyprland_logo = true
}

autogenerated = 0

### ============================================
### PLUGIN CONFIGURATION
### ============================================

### ============================================
### WINDOW RULES
### ============================================

# OPACITY RULES
windowrule = match:class ^(firefox)$, opacity 0.90 override 0.90 override
windowrule = match:class ^(firefox)$ match:title ^(Library)$, opacity 1
windowrule = match:class ^(firefox)$ match:title (Metabase), opacity 1
windowrule = match:class ^(zen-alpha)$, opacity 0.90 override 0.90 override
windowrule = match:class ^(zen-beta)$, opacity 0.90 override 0.90 override
windowrule = match:class ^(zen)$, opacity 0.90 override 0.90 override
windowrule = match:class ^(com.github.hluk.copyq)$, opacity 0.90 override 0.90 override
windowrule = match:class ^(Code)$, opacity 0.90 override 0.90 override
windowrule = match:class ^(code-url-handler)$, opacity 0.90 override 0.90 override
windowrule = match:class ^(antigravity)$, opacity 0.90 override 0.90 override
windowrule = match:class (Vivaldi-stable), opacity 0.90 override 0.90 override
windowrule = match:class ^(bruno)$, opacity 0.90 override 0.90 override
windowrule = match:class ^(Google-chrome)$, opacity 0.90 override 0.90 override
windowrule = match:class ^(MuPDF)$, opacity 0.90 override 0.90 override
windowrule = match:class libreoffice-calc, opacity 0.90

# FLOATING RULES
windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(float)$, float on
windowrule = match:class ^(floating)$, float on
windowrule = match:title ^(floating)$, float on
windowrule = match:class ^(python3)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:title ^(ranger)$, float on
windowrule = match:title ^(Task Manager - Vivaldi)$, float on
windowrule = match:class ^(com.github.hluk.copyq)$, float on
windowrule = match:title ^(Live Caption)$, float on
windowrule = match:class ^(Yad)$, float on
windowrule = match:class ^(feh)$, float on
windowrule = match:class ^(org.gnome.Nautilus)$, float on
windowrule = match:class ^(Alacritty)$, float on
windowrule = match:title ^(.*gpg2.*password-store.*)$, float on
windowrule = match:class ^(Pinentry-gtk-2)$, float on
windowrule = match:title ^(Sign in.*Google Accounts), float on
windowrule = match:class ^(yad)$, float on

# SIZE RULES
windowrule = match:class ^(float)$, size 49.65% 48%, center on
windowrule = match:class ^(Alacritty)$, size 1600 900
windowrule = match:class ^(com.github.hluk.copyq)$, size 1600 900, center on

# BORDER RULES
#windowrule = match:class (Vivaldi-stable), no_border on
#windowrule = match:class ^(bruno)$, no_border on
#windowrule = match:class ^(Antigravity)$, no_border on

# WORKSPACE ASSIGNMENT
windowrule = match:class ^(bruno)$, workspace 3
windowrule = match:class (Vivaldi-stable), workspace 4
windowrule = match:class ^(Emacs)$, workspace 6
windowrule = match:title ^(mail.google.com.*), workspace 9
windowrule = match:class ^(zen-alpha)$, workspace 4
windowrule = match:class ^(zen-beta)$, workspace 4
windowrule = match:class ^(zen)$, workspace 4
windowrule = match:class ^(Antigravity)$, workspace 2


### ============================================
### KEY BINDINGS
### ============================================

$mainMod = SUPER
$term = alacritty

### BASIC BINDINGS
# Terminal
bind = $mainMod, return, exec, $term -e tmux
bind = $mainMod SHIFT, return, exec, $term -e tmux

# Kill focused window
bind = $mainMod SHIFT, C, killactive,

# Application launchers

# Reload/restart/exit
bind = $mainMod, Q, exec, hyprctl reload
bind = $mainMod CONTROL, Q, exec, hyprctl reload
bind = ALT CONTROL, delete, exec, hyprctl reload
bind = ALT CONTROL SHIFT, Q, exec, hyprctl reload
bind = $mainMod CONTROL SHIFT, Q, exit,

# Lock and suspend
bind = $mainMod SHIFT, Z, exec, hyprlock
bind = $mainMod CONTROL SHIFT, Z, exec, swaylock -f -c 000000 && sleep 1 && systemctl suspend

# Applications
bind = ALT, B, exec, google-chrome
bind = $mainMod SHIFT, semicolon, exec, /home/krishnan/.local/bin/:commands
bind = ALT, L, exec, redis-clear

# Toggle terminal transparency

# Toggle light/dark mode system-wide

### WINDOW MOVEMENT
# Move focus (vim keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Move focus (arrow keys)
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

# Focus parent/child (Hyprland doesn't have direct equivalent - using cyclenext)
bind = $mainMod, TAB, focusurgentorlast
bind = $mainMod SHIFT, TAB, cyclenext

# Move windows (vim keys)
binde = $mainMod SHIFT, H, movewindow, l
binde = $mainMod SHIFT, J, movewindow, d
binde = $mainMod SHIFT, K, movewindow, u
binde = $mainMod SHIFT, L, movewindow, r

# Move window (arrow keys)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

bind = $mainMod CONTROL, C, centerwindow

# Resize windows
binde = $mainMod CONTROL, H, resizeactive, -50 0
binde = $mainMod CONTROL, L, resizeactive, 50 0
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
binde = $mainMod CONTROL, K, resizeactive, 0 -50
binde = $mainMod CONTROL, J, resizeactive, 0 50

### WORKSPACES
# Move focused container to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Navigate workspaces
bind = $mainMod, COMMA, workspace, m-1
bind = $mainMod, PERIOD, workspace, m+1

# Move workspaces to outputs
bind = $mainMod ALT, H, movecurrentworkspacetomonitor, l
bind = $mainMod ALT, J, movecurrentworkspacetomonitor, d
bind = $mainMod ALT, K, movecurrentworkspacetomonitor, u
bind = $mainMod ALT, L, movecurrentworkspacetomonitor, r

### LAYOUT
# Split orientation (using hy3 plugin if available)
# Switch container layout (Hyprland doesn't have stacking/tabbed like Sway)

# Fullscreen
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0

# Toggle floating
bind = $mainMod, T, togglefloating,


bind = $mainMod, SPACE, exec, hyprctl dispatch focuswindow $(if [[ $(hyprctl activewindow -j | jq ."floating") == "true" ]]; then echo "tiled"; else echo "floating"; fi;)

### SCRATCHPAD
# Move window to scratchpad (using special workspace)
bind = $mainMod SHIFT, BACKSLASH, movetoworkspace, special:scratch

# Show scratchpad window
bind = $mainMod, BACKSLASH, togglespecialworkspace, scratch

### APPLICATION SWITCHER
bind = $mainMod CONTROL, A, exec, sway-app-switcher "" antigravity
bind = $mainMod CONTROL, T, exec, sway-app-switcher Alacritty
bind = $mainMod CONTROL, B, exec, sway-app-switcher zen
bind = $mainMod CONTROL, E, exec, sway-app-switcher "" Emacs

### MOUSE BINDINGS
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse:275, workspace, m-1
bind = $mainMod, mouse:276, workspace, m+1

### MEDIA & SYSTEM
# Audio Control
binde = $mainMod, EQUAL, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
binde = $mainMod, MINUS, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
binde =, XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
binde =, XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
bind  =, XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind  =, XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness
binde = $mainMod SHIFT, EQUAL, exec, brightnessctl set 5%+
binde = $mainMod SHIFT, MINUS, exec, brightnessctl set 5%-
binde =, XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde =, XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Monitor configuration
bind = $mainMod, F7, exec, hyprctl keyword monitor eDP-1,1920x1080,960x2160,1
bind = $mainMod SHIFT, F7, exec, hyprctl keyword monitor eDP-1,disable

# Screenshot
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, PRINT, exec, hyprshot -m window
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m output

# Utility
bind = $mainMod CONTROL SHIFT, V, exec, killall -9 vivaldi-bin

### GROUPS/TABS
# Note: Moving into groups conflicts with window movement - commented for now
# bind = $mainMod CTRL SHIFT, H, moveintogroup, l
# bind = $mainMod CTRL SHIFT, L, moveintogroup, r
# bind = $mainMod CTRL SHIFT, K, moveintogroup, u
# bind = $mainMod CTRL SHIFT, J, moveintogroup, d

### GAPS TOGGLE
bind = $mainMod ALT, G, exec, hyprctl --batch "keyword general:gaps_in 10; keyword general:gaps_out 0; keyword general:border_size 2; keyword decoration:rounding 10"
bind = $mainMod ALT SHIFT, G, exec, hyprctl --batch "keyword general:gaps_in 0; keyword general:gaps_out 0; keyword general:border_size 0; keyword decoration:rounding 0"

